<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Empire | Bot Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-microchip icon-blue"></i> DARK EMPIRE</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-target="dashboard-view">
                    <i class="fa-solid fa-table-cells-large"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-target="audio-library-view">
                    <i class="fa-solid fa-music"></i> Audio Library
                </a>
                <a href="#" class="nav-item placeholder" data-target="global-controls-view">
                    <i class="fa-solid fa-sliders"></i> Global Controls
                </a>
                <a href="#" class="nav-item placeholder" data-target="user-manager-view">
                    <i class="fa-solid fa-users"></i> User Manager
                </a>
                <a href="#" class="nav-item" data-target="live-logs-view">
                    <i class="fa-solid fa-terminal"></i> Live Logs
                </a>
                <a href="#" class="nav-item logout" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </nav>

            <div class="sidebar-stats">
                <div class="stat-row">
                    <span class="stat-label">CPU</span>
                    <div class="stat-bar-container">
                        <div class="stat-bar" id="cpuBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">MEM</span>
                    <div class="stat-bar-container">
                        <div class="stat-bar" id="memBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="global-actions">
                    <div class="input-group">
                        <i class="fa-solid fa-link"></i>
                        <input type="text" id="globalChannelId" placeholder="Paste Channel ID here (Right-click Channel)">
                    </div>
                    <button class="btn btn-primary" id="globalJoinBtn">JOIN VC</button>
                    <button class="btn btn-danger" id="globalLeaveBtn">LEAVE ALL</button>
                </div>
                <div class="status-badge offline" id="globalStatus">
                    OFFLINE
                </div>
            </header>

            <!-- Views Container -->
            <div class="views-container">
                
                <!-- Dashboard View -->
                <div id="dashboard-view" class="view active">
                    <div class="view-header">
                        <h2>Bot Fleet (<span id="onlineBotsCount">0</span>/10)</h2>
                        <button id="addBotBtn" class="btn btn-outline">+ Add Bot</button>
                    </div>
                    <div class="bots-grid" id="botsGrid">
                        <!-- Bot cards will be injected here -->
                    </div>
                </div>

                <!-- Audio Library View -->
                <div id="audio-library-view" class="view">
                    <div class="view-header">
                        <h2>Audio Library</h2>
                    </div>
                    <div class="panel">
                        <div class="upload-section">
                            <input type="file" id="audioUpload" accept=".mp3,audio/*" multiple>
                            <button id="uploadBtn" class="btn btn-primary">Upload Audio</button>
                        </div>
                        <div id="audioList" class="audio-list">
                            <!-- Audio files will be listed here -->
                        </div>
                    </div>
                </div>

                <!-- Live Logs View -->
                <div id="live-logs-view" class="view">
                    <div class="view-header">
                        <h2>Live Logs</h2>
                    </div>
                    <div class="log-panel">
                        <div id="logContainer" class="log-container"></div>
                    </div>
                </div>
                
                <!-- Global Controls View -->
                <div id="global-controls-view" class="view">
                    <div class="view-header"><h2>Global Controls</h2></div>
                    <div class="panel">
                        <div class="global-controls-grid" style="display: grid; gap: 20px; grid-template-columns: 1fr 1fr;">
                            <div class="control-box">
                                <h3>Global Connection</h3>
                                <div class="input-group" style="margin-bottom: 10px;">
                                    <input type="text" id="globalControlChannelId" placeholder="Channel ID" style="width: 100%; padding: 10px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; border-radius: 6px;">
                                </div>
                                <button class="btn btn-primary" id="btnJoinAll" style="width: 100%; margin-bottom: 10px;">Join All Bots</button>
                                <button class="btn btn-danger" id="btnLeaveAll" style="width: 100%;">Disconnect All</button>
                            </div>
                            <div class="control-box">
                                <h3>Global Playback</h3>
                                <div class="input-group" style="margin-bottom: 10px;">
                                    <select id="globalAudioSelect" style="width: 100%; padding: 10px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; border-radius: 6px;">
                                        <option value="">Select Audio File...</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary" id="btnPlayAll" style="width: 100%; margin-bottom: 10px;">Play on All Connected</button>
                                <button class="btn btn-danger" id="btnStopAll" style="width: 100%;">Stop Playback on All</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- User Manager View -->
                <div id="user-manager-view" class="view">
                    <div class="view-header"><h2>User Manager</h2></div>
                    <div class="panel">
                        <div style="display: flex; gap: 20px;">
                            <div style="flex: 1;">
                                <h3>Add New User</h3>
                                <form id="addUserForm" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                                    <input type="text" id="newUsername" placeholder="Username" required style="padding: 10px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; border-radius: 6px;">
                                    <input type="password" id="newPassword" placeholder="Password" required style="padding: 10px; background: var(--bg-main); border: 1px solid var(--border-color); color: white; border-radius: 6px;">
                                    <button type="submit" class="btn btn-primary">Add User</button>
                                </form>
                            </div>
                            <div style="flex: 2;">
                                <h3>Current Users</h3>
                                <div class="audio-list" id="usersList" style="margin-top: 15px;">
                                    <!-- Users injected here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <!-- Bottom Player Bar -->
        <footer class="bottom-player">
            <div class="now-playing-info">
                <i class="fa-solid fa-compact-disc icon-blue"></i>
                <span id="globalNowPlaying" class="track-name">NO TRACK SELECTED</span>
            </div>
            <div class="player-controls">
                <button class="icon-btn" id="globalLoopBtn"><i class="fa-solid fa-rotate-right"></i></button>
                <button class="icon-btn stop-btn" id="globalStopBtn"><i class="fa-solid fa-stop"></i></button>
                <button class="icon-btn" id="globalRefreshBtn"><i class="fa-solid fa-arrow-rotate-right"></i></button>
            </div>
        </footer>
    </div>

    <!-- Add Bot Modal -->
    <div id="addBotModal" class="modal">
        <div class="modal-content">
            <h2>Add New Bot</h2>
            <form id="addBotForm">
                <label for="botToken">Bot Token:</label>
                <input type="text" id="botToken" placeholder="Enter Discord bot token" required>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-outline" id="closeModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Bot</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
