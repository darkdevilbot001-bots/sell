services:
  # First Render Instance - Instance 1
  - type: web
    name: multi-bot-audio-1
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: BOT_TOKENS
        sync: false
      - key: AUDIO_STORAGE_PATH
        value: ./audio-files
      - key: MAX_AUDIO_SIZE
        value: "50"

  # Second Render Instance - Instance 2
  - type: web
    name: multi-bot-audio-2
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: BOT_TOKENS
        sync: false
      - key: AUDIO_STORAGE_PATH
        value: ./audio-files
      - key: MAX_AUDIO_SIZE
        value: "50"